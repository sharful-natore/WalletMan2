name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ৪. গ্রেডল সেটআপ করা (ভার্সন ৯.৩.১)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # সমাধান: রানারের পিসিতে একটি স্ট্যান্ডার্ড ডিবাগ কি-স্টোর জেনারেট করা
      # যার পাসওয়ার্ড: android এবং অ্যালাইয়াস: androiddebugkey
      # এটি প্রজেক্টের রুট এবং app ফোল্ডার—উভয় জায়গাতেই কপি করে দেওয়া হচ্ছে যাতে গ্রেডল যেকোনো এক জায়গা থেকে পেলেই বিল্ড করে নেয়।
      - name: Generate Default Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cp ~/.android/debug.keystore ./debug.keystore
          cp ~/.android/debug.keystore ./app/debug.keystore

      - name: Build with Gradle
        run: gradle assembleDebug
