name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # গ্রেডল সেটআপ করা (ভার্সন ৯.৩.১)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # গিটহাব সিক্রেট থেকে Base64 ডাটা নিয়ে কি-স্টোর ফাইল তৈরি করা
      - name: Decode Keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore

      # গ্রেডল বিল্ড রান করা
      - name: Build with Gradle
        run: gradle assembleDebug
